<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="You.com Desktop — App desktop pro You.com em janela limpa. Login automático." />
  <meta property="og:title" content="You.com Desktop" />
  <meta property="og:description" content="You.com em janela limpa. Login automático. Open source." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://ryanabcraft.github.io/youcom-desktop/og-image.png" />
  <title>You.com Desktop</title>
  <link rel="icon" href="https://you.com/favicon.ico" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Segoe UI",sans-serif;background:#f6f2e8;color:#111315;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
    .card{max-width:420px;width:100%;background:#fffaf0;border:1px solid #111315;border-radius:8px;box-shadow:6px 6px 0 #111315;padding:40px 32px}
    .icon{width:64px;height:64px;border-radius:14px;background:#7c3aed;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;padding:8px}
    .icon svg{width:48px;height:48px;fill:white}
    h1{font-family:Georgia,serif;font-size:32px;margin-bottom:8px}
    p{color:#5e646c;font-size:15px;line-height:1.5;margin-bottom:20px}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;background:#7c3aed;color:white;border:1px solid #111315;border-radius:6px;font-size:14px;font-weight:800;text-decoration:none;box-shadow:4px 4px 0 #111315;transition:120ms}
    .btn:hover{transform:translate(2px,2px);box-shadow:2px 2px 0 #111315}
    .links{display:flex;gap:12px;justify-content:center;margin-top:12px;font-size:13px}
    .links a{color:#5e646c}
    .badge{font-size:12px;color:#5e646c;margin-top:16px}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
    </div>
    <h1>You.com Desktop</h1>
    <p>You.com em janela limpa. Login automático. Multiplataforma.</p>
    <a class="btn" href="https://github.com/Ryanabcraft/youcom-desktop/releases/latest/download/YouCom-Setup.exe">⬇ Baixar</a>
    <div class="links">
      <a href="https://github.com/Ryanabcraft/youcom-desktop">GitHub</a>
      <a href="https://ryanabcraft.github.io/youcom-desktop/">Site</a>
    </div>
    <div class="badge">v1.0.0 &middot; Open source &middot; MIT</div>
  </div>
</body>
</html>
